  .page { display: none; }

  .btn-outline { background: transparent; color: #2563eb; border: 1.5px solid #2563eb; }

      grid-template-columns: 1fr !important;

const CLOUD_ID = '019ed8f4-d778-7203-b0d6-443882390539';
const CLOUD_URL = 'https://jsonblob.com/api/jsonBlob/' + CLOUD_ID;

const Store = {
  KEY: 'tracaoVeiculos2026',
  data: null,
  syncing: false,

  async init() {
    const local = localStorage.getItem(this.KEY);
    if (local) {
      try { this.data = JSON.parse(local); } catch(e) { this.data = null; }
    }
    try {
      const r = await fetch(CLOUD_URL);
      if (r.ok) {
        const cloud = await r.json();
        if (cloud && cloud.initialized) {
          this.data = cloud;
          this.saveLocal();
        }
      }
    } catch(e) {
      console.warn('Cloud sync failed, using local data:', e);
    }
    if (!this.data || !this.data.initialized) {
      this.data = {
        initialized: true,
        users: DEFAULT_USERS,
        sales: [],
        stock: [],
        settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS))
      };
      this.saveLocal();
      this.pushToCloud();
    }
  },

  saveLocal() {
    localStorage.setItem(this.KEY, JSON.stringify(this.data));
  },

  save() {
    this.saveLocal();
    this.pushToCloud();
  },

  async pushToCloud() {
    if (this.syncing) return;
    this.syncing = true;
    try {
      await fetch(CLOUD_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.data)
      });
    } catch(e) {
      console.warn('Cloud push failed:', e);
    }
    this.syncing = false;
  },

  async pullFromCloud() {
    try {
      const r = await fetch(CLOUD_URL);
      if (r.ok) {
        const cloud = await r.json();
        if (cloud && cloud.initialized) {
          this.data = cloud;
          this.saveLocal();
          return true;
        }
      }
    } catch(e) {
      console.warn('Cloud pull failed:', e);
    }
    return false;
  },

  // Users
  getUsers() { return this.data.users || []; },
  getUserById(id) { return this.data.users.find(u => u.id === id); },
  saveUser(user) {
    const idx = this.data.users.findIndex(u => u.id === user.id);
    if (idx >= 0) this.data.users[idx] = user;
    else this.data.users.push(user);
    this.save();
  },
  deleteUser(id) {
    this.data.users = this.data.users.filter(u => u.id !== id);
    this.save();
  },

  // Sales
  getSales(sellerId) {
    let sales = this.data.sales || [];
    if (sellerId) sales = sales.filter(s => s.sellerId === sellerId);
    return sales.sort((a,b) => new Date(b.date) - new Date(a.date));
  },
  getSaleById(id) { return this.data.sales.find(s => s.id === id); },
  saveSale(sale) {
    const idx = this.data.sales.findIndex(s => s.id === sale.id);
    if (idx >= 0) this.data.sales[idx] = sale;
    else this.data.sales.push(sale);
    this.save();
  },
  deleteSale(id) {
    this.data.sales = this.data.sales.filter(s => s.id !== id);
    this.save();
  },

  // Stock
  getStock() { return (this.data.stock || []).sort((a,b) => new Date(b.entryDate) - new Date(a.entryDate)); },
  getActiveStock() { return this.getStock().filter(s => s.status === 'available'); },
  getStockById(id) { return this.data.stock.find(s => s.id === id); },
  saveStock(item) {
    const idx = this.data.stock.findIndex(s => s.id === item.id);
    if (idx >= 0) this.data.stock[idx] = item;
    else this.data.stock.push(item);
    this.save();
  },
  deleteStock(id) {
    this.data.stock = this.data.stock.filter(s => s.id !== id);
    this.save();
  },

  // Settings
  getSettings() { return this.data.settings || JSON.parse(JSON.stringify(DEFAULT_SETTINGS)); },
  saveSettings(settings) {
    this.data.settings = settings;
    this.save();
  },

  // Stats
  getMonthSales(sellerId, year, month) {
    let sales = this.getSales(sellerId);
    return sales.filter(s => {
      const d = new Date(s.date);
      return d.getFullYear() === year && d.getMonth() === month;
    });
  }
};

// ============================================================
// COMMISSION CALCULATOR
// ============================================================
const Calculator = {
  calculate(sale, context) {
    const { stockCount, monthlySalesCount, platedCount, settings } = context;
    const s = settings;
    const breakdown = [];
    let total = 0;

    const metaThreshold = s.vehicleCommission.metaThreshold || 6;
    const hasMeta = monthlySalesCount >= metaThreshold;
    const registrationGoal = s.despachante.registrationGoalThreshold || 0.70;
    const registrationNeeded = Math.round(monthlySalesCount * registrationGoal);
    const hasRegistrationMeta = hasMeta && platedCount >= registrationNeeded;

    // 1. Base vehicle commission
    let vehicleComm = hasMeta ? s.vehicleCommission.meta : s.vehicleCommission.belowMeta;
    if (hasMeta) {
      const cappedSales = Math.min(monthlySalesCount, 10);
      const bonusRate = s.vehicleCommission.bonusRates[cappedSales];
      if (bonusRate) vehicleComm = vehicleComm * (1 + bonusRate);
    }
    breakdown.push({
      category: 'Veículo (base)',
      description: `${monthlySalesCount} venda(s) no mês × R$${fmt(vehicleComm)}/venda${hasMeta ? ' — META atingida' : ` — faltam ${metaThreshold - monthlySalesCount} para meta`}`,
      value: vehicleComm,
      hasMeta
    });
    total += vehicleComm;

    // 2. IPVA Cliente
    if (sale.ipvaClient && sale.ipvaClient.value > 0 && sale.ipvaClient.eligible) {
      const rate = hasMeta ? s.ipva.withGoal : s.ipva.withoutGoal;
      const comm = sale.ipvaClient.value * rate;
      breakdown.push({ category: 'IPVA Cliente', description: `${pct(rate)} sobre R$${fmt(sale.ipvaClient.value)}`, value: comm });
      total += comm;
    }

    // 3. IPVA Estoque
    if (sale.ipvaStock && sale.ipvaStock.value > 0 && sale.ipvaStock.eligible) {
      const rate = hasMeta ? s.ipva.withGoal : s.ipva.withoutGoal;
      const comm = sale.ipvaStock.value * rate;
      breakdown.push({ category: 'IPVA Estoque', description: `${pct(rate)} sobre R$${fmt(sale.ipvaStock.value)}`, value: comm });
      total += comm;
    }

    // 4. Financing
    if (sale.financing && sale.financing.value > 0 && sale.financing.rTier) {
      const rRates = s.financing.rRates || { R1: 0.012, R2: 0.024, R3: 0.036, R4: 0.048 };
      const rRate = rRates[sale.financing.rTier] || 0;
      const grossR = sale.financing.value * rRate;
      const taxDed = s.financing.taxDeduction !== undefined ? s.financing.taxDeduction : 0.25;
      const netR = grossR * (1 - taxDed);

      let commRate;
      if (hasMeta && sale.financing.hasTAC)       commRate = s.financing.withGoalWithTAC;
      else if (hasMeta && !sale.financing.hasTAC) commRate = s.financing.withGoalWithoutTAC;
      else if (!hasMeta && sale.financing.hasTAC) commRate = s.financing.withoutGoalWithTAC;
      else                                         commRate = s.financing.withoutGoalWithoutTAC;

      const comm = netR * commRate;
      const tacLabel = sale.financing.hasTAC ? ' + TAC' : '';
      breakdown.push({
        category: 'Financiamento',
        description: `${sale.financing.rTier} (${pct(rRate)}) de R$${fmt(sale.financing.value)} = R$${fmt(grossR)} → −25% imp. = R$${fmt(netR)} × ${pct(commRate)}${tacLabel}`,
        value: comm
      });
      total += comm;
      if (sale.financing.hasTAC) {
        breakdown.push({ category: 'TAC (cobrada do cliente)', description: 'Valor inegociável — não entra na base de comissão', value: 0, note: `R$${fmt(s.financing.tacValue)}` });
      }
    }

    // 5. Seguro Safra
    if (sale.hasInsurance) {
      const comm = hasMeta ? s.insurance.withGoal : s.insurance.withoutGoal;
      breakdown.push({ category: 'Seguro Safra', description: hasMeta ? 'Com meta' : 'Sem meta', value: comm });
      total += comm;
    }

    // 6. Despachante
    if (sale.hasDespachante) {
      let comm;
      let desc;
      if (hasMeta && hasRegistrationMeta) {
        comm = s.despachante.withBothGoals;
        desc = `R$${fmt(s.despachante.withBothGoals)}/emplacamento — meta vendas (${monthlySalesCount}) + emplacamento (${platedCount}/${registrationNeeded} ✓)`;
      } else if (hasMeta) {
        comm = s.despachante.withSalesGoal;
        desc = `R$${fmt(s.despachante.withSalesGoal)}/emplacamento — meta vendas ok, emplacamentos: ${platedCount}/${registrationNeeded} (faltam ${registrationNeeded - platedCount})`;
      } else {
        comm = s.despachante.withoutGoal;
        desc = `R$${fmt(s.despachante.withoutGoal)}/emplacamento — sem meta de vendas (${monthlySalesCount}/${metaThreshold})`;
      }
      breakdown.push({ category: 'Despachante', description: desc, value: comm });
      total += comm;
    }

    // 7. Excedente
    if (sale.excedente && sale.excedente.value > 0) {
      const rate = hasMeta ? s.excedente.withGoal : s.excedente.withoutGoal;
      const comm = sale.excedente.value * rate;
      const payNote = hasMeta ? ' (25% agora + 25% no salário)' : ' (no fechamento)';
      breakdown.push({ category: 'Excedente', description: `${pct(rate)} sobre R$${fmt(sale.excedente.value)}${payNote}`, value: comm });
      total += comm;
    }

    // 8. Consigned captation
    if (sale.consigned && sale.consigned.captationProfit > 0) {
      const comm = sale.consigned.captationProfit * s.consigned.captationRate;
      breakdown.push({ category: 'Captação Consignado', description: `10% lucro R$${fmt(sale.consigned.captationProfit)}`, value: comm });
      total += comm;
    }

    // 9. Services for consignor
    if (sale.consigned && sale.consigned.servicesProfit > 0) {
      const comm = sale.consigned.servicesProfit * s.consigned.servicesRate;
      breakdown.push({ category: 'Serviços Consignado', description: `40% lucro serviços R$${fmt(sale.consigned.servicesProfit)}`, value: comm });
      total += comm;
    }

    // 10. Stock purchase captation bonus
    if (sale.stockCaptation && sale.stockCaptation.value > 0) {
      const comm = sale.stockCaptation.value;
      breakdown.push({ category: 'Captação para Estoque', description: `Veículo captado para compra`, value: comm });
      total += comm;
    }

    return { total, breakdown, hasMeta, hasRegistrationMeta };
  }
};

// ============================================================
// UTILITIES
// ============================================================
function fmt(n) { return Number(n||0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtR(n) { return 'R$ ' + fmt(n); }
function pct(n) { return (n*100).toFixed(0)+'%'; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function dateStr(d) { return new Date(d).toLocaleDateString('pt-BR'); }
function monthName(m) { return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m]; }
function currentMonthLabel() { const d = new Date(); return `${monthName(d.getMonth())} ${d.getFullYear()}`; }
function getContext(sellerId) {
  const settings = Store.getSettings();
  const stock = Store.getActiveStock();
  const stockCount = stock.length;
  const now = new Date();
  const monthlySales = Store.getMonthSales(sellerId, now.getFullYear(), now.getMonth());
  const platedCount = monthlySales.filter(s => s.hasDespachante && s.isPlated).length;
  return { stockCount, monthlySalesCount: monthlySales.length, platedCount, settings };
}

function showModal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-backdrop" id="activeModal" onclick="if(event.target.id==='activeModal')closeModal()">${html}</div>`;
}
function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `alert alert-${type}`;
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:999;min-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:fadeIn .2s;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// APP
// ============================================================
const App = {
  currentUser: null,
  currentPage: 'dashboard',

  async init() {
    await Store.init();
    const saved = sessionStorage.getItem('tracaoUser');
    if (saved) {
      try {
        const u = JSON.parse(saved);
        const found = Store.getUserById(u.id);
        if (found && found.active) { this.currentUser = found; this.showApp(); return; }
      } catch(e) {}
    }
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appPage').classList.add('hidden');
    document.getElementById('loginEmail').addEventListener('keydown', e => { if(e.key==='Enter') this.login(); });
    document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') this.login(); });
  },

  login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    const user = Store.getUsers().find(u => u.email === email && u.password === pass && u.active);
    const errEl = document.getElementById('loginError');
    if (!user) {
      errEl.textContent = 'E-mail ou senha incorretos.';
      errEl.classList.remove('hidden');
      return;
    }
    errEl.classList.add('hidden');
    this.currentUser = user;
    sessionStorage.setItem('tracaoUser', JSON.stringify({ id: user.id }));
    this.showApp();
  },

  logout() {
    sessionStorage.removeItem('tracaoUser');
    this.currentUser = null;
    document.getElementById('appPage').classList.add('hidden');
    document.getElementById('appPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginPassword').value = '';
  },

  showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('appPage').style.display = 'flex';
    const u = this.currentUser;
    document.getElementById('sidebarUserName').textContent = u.name;
    document.getElementById('sidebarUserRole').textContent = u.role === 'admin' ? 'Administrador' : 'Vendedor';
    document.getElementById('sidebarAvatar').textContent = u.name.charAt(0).toUpperCase();
    if (u.role === 'admin') {
      document.getElementById('nav-config').classList.remove('hidden');
      document.getElementById('nav-usuarios').classList.remove('hidden');
    }
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('pt-BR', {weekday:'long',day:'numeric',month:'long'});
    this.navigate('dashboard');
  },

  openSidebar() {
    document.querySelector('.sidebar').classList.add('mobile-open');
    document.getElementById('sidebarOverlay').classList.add('open');
  },

  closeSidebar() {
    document.querySelector('.sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  },

  async syncFromCloud() {
    const icon = document.getElementById('syncIcon');
    if (icon) icon.style.animation = 'spin 1s linear infinite';
    const ok = await Store.pullFromCloud();
    if (icon) icon.style.animation = '';
    if (ok) {
      this.navigate(this.currentPage);
      toast('Dados atualizados da nuvem!', 'success');
    } else {
      toast('Falha ao conectar com a nuvem.', 'error');
    }
  },

  navigate(page) {
    this.currentPage = page;
    this.closeSidebar();
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const pageEl = document.getElementById('page-' + page);
    if (pageEl) pageEl.classList.add('active');
    const navEl = document.querySelector(`.nav-item[data-page="${page}"]`);
    if (navEl) navEl.classList.add('active');

    const titles = {
      dashboard: ['Dashboard', currentMonthLabel()],
      vendas: ['Vendas', 'Registre e gerencie suas vendas'],
      estoque: ['Estoque', 'Veículos disponíveis para venda'],
      comissoes: ['Comissões', 'Detalhamento das comissões'],
      relatorios: ['Relatórios', 'Resumo mensal e exportação'],
      config: ['Configurações', 'Parâmetros de comissionamento'],
      usuarios: ['Usuários', 'Gestão de vendedores e admins']
    };
    const [title, sub] = titles[page] || ['', ''];
    document.getElementById('pageTitle').textContent = title;
    document.getElementById('pageSubtitle').textContent = sub;

    // Update meta badge
    const ctx = getContext(this.currentUser.role === 'admin' ? null : this.currentUser.id);
    const metaEl = document.getElementById('metaBadge');
    const salesCount = ctx.monthlySalesCount;
    const metaThreshold = ctx.settings.vehicleCommission.metaThreshold || 6;
    if (salesCount >= metaThreshold) {
      metaEl.className = 'meta-badge meta-atingida';
      metaEl.innerHTML = `<svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg> META: ${salesCount} vendas`;
    } else {
      metaEl.className = 'meta-badge meta-nao-atingida';
      metaEl.innerHTML = `${salesCount}/${metaThreshold} vendas para meta`;
    }

    const renders = {
      dashboard: () => this.renderDashboard(),
      vendas: () => this.renderVendas(),
      estoque: () => this.renderEstoque(),
      comissoes: () => this.renderComissoes(),
      relatorios: () => this.renderRelatorios(),
      config: () => this.renderConfig(),
      usuarios: () => this.renderUsuarios()
    };
    if (renders[page]) renders[page]();
  },

  // ============================================================
  // ADMIN DASHBOARD
  // ============================================================
  renderDashboardAdmin() {
    const now = new Date();
    const settings = Store.getSettings();
    const metaThreshold = settings.vehicleCommission.metaThreshold || 6;
    const sellers = Store.getUsers().filter(u => u.active && u.role === 'seller');

    // Per-vendor calculation
    const vendorData = sellers.map(seller => {
      const ctx = getContext(seller.id);
      const sales = Store.getMonthSales(seller.id, now.getFullYear(), now.getMonth());
      const hasMeta = sales.length >= metaThreshold;
      const platedCount = sales.filter(s => s.hasDespachante && s.isPlated).length;
      const regNeeded = Math.round(sales.length * (settings.despachante.registrationGoalThreshold || 0.70));
      const hasRegMeta = hasMeta && platedCount >= regNeeded;
      let totalComm = 0;
      const catTotals = {};
      sales.forEach(sale => {
        const res = Calculator.calculate(sale, ctx);
        totalComm += res.total;
        res.breakdown.forEach(b => {
          catTotals[b.category] = (catTotals[b.category] || 0) + (b.value || 0);
        });
      });
      return { seller, sales, salesCount: sales.length, hasMeta, hasRegMeta, platedCount, regNeeded, totalComm, catTotals };
    });

    const totalSales   = vendorData.reduce((s,v) => s + v.salesCount, 0);
    const totalComm    = vendorData.reduce((s,v) => s + v.totalComm, 0);
    const withMeta     = vendorData.filter(v => v.hasMeta).length;
    const withRegMeta  = vendorData.filter(v => v.hasRegMeta).length;

    // Combined category totals (all vendors)
    const allCats = {};
    vendorData.forEach(v => Object.entries(v.catTotals).forEach(([c,val]) => { allCats[c] = (allCats[c]||0) + val; }));

    // Vendor rows for the table
    const CAT_COLS = ['Veículo (base)','Financiamento','IPVA Cliente','IPVA Estoque','Seguro Safra','Despachante','Excedente'];
    const vendorRows = vendorData.map(v => {
      const metaBadge = v.hasMeta
        ? `<span class="badge badge-green">✓ Meta</span>`
        : `<span class="badge badge-red">${v.salesCount}/${metaThreshold}</span>`;
      const regBadge = v.hasRegMeta
        ? `<span class="badge badge-green">${v.platedCount}/${v.regNeeded}</span>`
        : v.hasMeta
          ? `<span class="badge badge-yellow">${v.platedCount}/${v.regNeeded}</span>`
          : `<span class="badge badge-gray">—</span>`;
      const catCells = CAT_COLS.map(c => `<td style="text-align:right;color:${(v.catTotals[c]||0)>0?'#15803d':'#94a3b8'};">${(v.catTotals[c]||0)>0?fmtR(v.catTotals[c]):'—'}</td>`).join('');
      return `<tr>
        <td><strong>${v.seller.name}</strong><br><span style="font-size:.72rem;color:#94a3b8;">${v.seller.email}</span></td>
        <td style="text-align:center;font-weight:700;">${v.salesCount}</td>
        <td style="text-align:center;">${metaBadge}</td>
        <td style="text-align:center;">${regBadge}</td>
        ${catCells}
        <td style="text-align:right;font-weight:800;color:#15803d;font-size:1rem;">${fmtR(v.totalComm)}</td>
        <td><button class="btn btn-secondary btn-sm" onclick="App.navigate('vendas')">Ver vendas</button></td>
      </tr>`;
    }).join('');

    // Totals row
    const totalsRow = `<tr style="background:#f0fdf4;font-weight:700;">
      <td>TOTAL</td>
      <td style="text-align:center;">${totalSales}</td>
      <td style="text-align:center;"><span class="badge badge-green">${withMeta}/${sellers.length}</span></td>
      <td style="text-align:center;"><span class="badge badge-green">${withRegMeta}/${sellers.length}</span></td>
      ${CAT_COLS.map(c=>`<td style="text-align:right;color:#15803d;">${allCats[c]>0?fmtR(allCats[c]):'—'}</td>`).join('')}
      <td style="text-align:right;color:#15803d;font-size:1.05rem;">${fmtR(totalComm)}</td>
      <td></td>
    </tr>`;

    // Category summary cards
    const catCards = Object.entries(allCats).filter(([,v])=>v>0).map(([cat,val])=>`
      <div style="background:white;border-radius:10px;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);">
        <div style="font-size:.7rem;font-weight:600;color:#64748b;">${cat.toUpperCase()}</div>
        <div style="font-size:1.1rem;font-weight:800;color:#15803d;margin-top:2px;">${fmtR(val)}</div>
      </div>`).join('');

    // CSV export function
    const csvData = [
      ['Vendedor','Email','Vendas','Meta','Emplaçamentos','Veículo Base','Financiamento','IPVA Cliente','IPVA Estoque','Seguro Safra','Despachante','Excedente','Total'],
      ...vendorData.map(v => [
        v.seller.name, v.seller.email, v.salesCount,
        v.hasMeta ? 'Sim' : 'Não',
        `${v.platedCount}/${v.regNeeded}`,
        ...CAT_COLS.map(c => (v.catTotals[c]||0).toFixed(2)),
        v.totalComm.toFixed(2)
      ])
    ].map(r => r.join(';')).join('\n');

    document.getElementById('dashboardContent').innerHTML = `
      <div style="margin-bottom:20px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;">
          <div class="card" style="padding:18px;">
            <div style="font-size:.72rem;font-weight:600;color:#64748b;margin-bottom:6px;">VENDEDORES ATIVOS</div>
            <div class="stat-value">${sellers.length}</div>
          </div>
          <div class="card" style="padding:18px;">
            <div style="font-size:.72rem;font-weight:600;color:#64748b;margin-bottom:6px;">TOTAL VENDAS — ${monthName(now.getMonth()).toUpperCase()}</div>
            <div class="stat-value">${totalSales}</div>

  exportCSV() {
    const csv = this._csvData || '';
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `folha_tracao_${new Date().toISOString().substr(0,7)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  },

      'Captação para Estoque':   { color: '#7e22ce', bg: '#faf5ff',  border: '#e9d5ff' },
    };

    const groups = {}; // category -> { items[], subtotal }
    let grandTotal = 0;

    sales.forEach((sale, idx) => {
      const res = Calculator.calculate(sale, ctx);
      grandTotal += res.total;
      const sellerUser = Store.getUserById(sale.sellerId);
      const label = (sale.vehicle || `Venda ${idx + 1}`) + (sale.plate ? ` (${sale.plate})` : '');
      const sellerLabel = isAdmin && sellerUser ? ` — ${sellerUser.name}` : '';

      res.breakdown.forEach(b => {
        if (!groups[b.category]) groups[b.category] = { items: [], subtotal: 0 };
        groups[b.category].items.push({
          label: label + sellerLabel,
          date: dateStr(sale.date),
          description: b.description,
          value: b.value,
          note: b.note || ''
        });
        groups[b.category].subtotal += b.value || 0;
      });
    });

    const orderedKeys = [
      ...CATEGORY_ORDER.filter(k => groups[k]),
      ...Object.keys(groups).filter(k => !CATEGORY_ORDER.includes(k))
    ];

    // Build one card per category
    const groupBlocks = orderedKeys.map(cat => {
      const g = groups[cat];
      const cs = CATEGORY_STYLE[cat] || { color: '#475569', bg: '#f8fafc', border: '#e2e8f0' };
      const payItems  = g.items.filter(i => i.value > 0);
      const infoItems = g.items.filter(i => i.value === 0);

      const payRows = payItems.map((item, i) => `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;${i < payItems.length-1 ? 'border-bottom:1px solid #f1f5f9;' : ''}">
          <div style="flex:1;min-width:0;padding-right:16px;">
            <div style="font-size:.825rem;font-weight:600;color:#1e293b;">${item.label}</div>
            <div style="font-size:.72rem;color:#64748b;margin-top:2px;line-height:1.4;">${item.description}</div>
            ${item.note ? `<div style="font-size:.7rem;color:#f59e0b;margin-top:2px;">ℹ ${item.note}</div>` : ''}
          </div>
          <div style="font-size:.95rem;font-weight:800;color:#16a34a;white-space:nowrap;">${fmtR(item.value)}</div>
        </div>`).join('');

      const infoRows = infoItems.map(item => `
        <div style="font-size:.72rem;color:#92400e;background:#fffbeb;border-radius:6px;padding:6px 10px;margin-top:4px;">
          ℹ ${item.label}: ${item.description}${item.note ? ' — ' + item.note : ''}
        </div>`).join('');

      return `
        <div class="card" style="overflow:hidden;margin-bottom:14px;border-left:3px solid ${cs.border};">
          <div style="padding:12px 18px;background:${cs.bg};display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid ${cs.border};">
            <div style="font-weight:700;color:${cs.color};font-size:.9rem;">${cat}</div>
            <div style="font-size:1.15rem;font-weight:800;color:${g.subtotal > 0 ? '#16a34a' : '#94a3b8'};">${fmtR(g.subtotal)}</div>
          </div>
          ${payItems.length > 0 ? `<div style="padding:6px 18px 10px;">${payRows}</div>` : ''}
          ${infoRows ? `<div style="padding:6px 18px 10px;">${infoRows}</div>` : ''}
          ${payItems.length === 0 && !infoRows ? `<div style="padding:12px 18px;font-size:.8rem;color:#94a3b8;">Nenhuma ocorrência este mês.</div>` : ''}
        </div>`;
    }).join('');

    // Summary chips for the totals footer
    const summaryChips = orderedKeys
      .filter(k => groups[k].subtotal > 0)
      .map(k => {
        const cs = CATEGORY_STYLE[k] || { color: '#475569', bg: '#f1f5f9', border: '#e2e8f0' };
        return `<div style="background:${cs.bg};border:1px solid ${cs.border};border-radius:8px;padding:6px 12px;">
          <div style="font-size:.68rem;font-weight:600;color:${cs.color};">${k}</div>
          <div style="font-size:.875rem;font-weight:800;color:#16a34a;">${fmtR(groups[k].subtotal)}</div>
        </div>`;
      }).join('');

    document.getElementById('comissoesContent').innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap;" class="no-print">
        <div>
          <div style="font-size:.72rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;">${monthName(now.getMonth())} ${now.getFullYear()} · ${sales.length} venda(s) · ${hasMeta ? '<span style="color:#16a34a;">META ATINGIDA</span>' : `<span style="color:#f59e0b;">faltam ${metaThreshold - sales.length} para meta</span>`}</div>
          <div style="font-size:2rem;font-weight:800;color:#16a34a;margin-top:4px;">${fmtR(grandTotal)}</div>
        </div>
        <button class="btn btn-secondary" onclick="window.print()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
          Imprimir
        </button>
      </div>

      ${sales.length === 0
        ? `<div class="card" style="padding:60px;text-align:center;color:#94a3b8;">Nenhuma venda registrada este mês.</div>`
        : `${groupBlocks}
           <div class="card" style="padding:20px;border-top:3px solid #16a34a;">
             <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
               <div style="font-size:.875rem;font-weight:700;color:#0f172a;text-transform:uppercase;letter-spacing:.03em;">Total Geral — ${monthName(now.getMonth())} ${now.getFullYear()}</div>
               <div style="font-size:1.75rem;font-weight:800;color:#16a34a;">${fmtR(grandTotal)}</div>
             </div>
             <div style="display:flex;flex-wrap:wrap;gap:8px;">${summaryChips}</div>
           </div>`
      }
    `;
  },

  // ============================================================
  // RELATÓRIOS
  // ============================================================
  renderRelatorios() {
    const u = this.currentUser;
    const isAdmin = u.role === 'admin';
    const sellerId = isAdmin ? null : u.id;
    const ctx = getContext(sellerId);
    const now = new Date();

    // Last 6 months
    let months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const sales = Store.getMonthSales(sellerId, d.getFullYear(), d.getMonth());
      let total = 0;
      sales.forEach(sale => { total += Calculator.calculate(sale, ctx).total; });
      months.push({ label: monthName(d.getMonth()).substr(0,3), year: d.getFullYear(), month: d.getMonth(), count: sales.length, total });
    }

    let monthRows = months.map(m => `<tr>
      <td>${m.label}/${m.year}</td>
      <td>${m.count}</td>
      <td style="color:#22c55e;font-weight:600;">${fmtR(m.total)}</td>
      <td>${m.count > 0 ? fmtR(m.total / m.count) : '—'}</td>
    </tr>`).join('');

    const maxTotal = Math.max(...months.map(m => m.total), 1);

    let bars = months.map(m => {
      const h = Math.round((m.total / maxTotal) * 100);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;">
        <div style="font-size:.7rem;color:#22c55e;font-weight:600;">${m.total > 0 ? fmtR(m.total).replace('R$ ','R$') : ''}</div>
        <div style="flex:1;display:flex;align-items:flex-end;width:100%;max-width:50px;">
          <div style="width:100%;height:${h}%;min-height:4px;background:${h===100?'#2563eb':'#93c5fd'};border-radius:4px 4px 0 0;transition:height .3s;"></div>
        </div>
        <div style="font-size:.72rem;color:#64748b;">${m.label}</div>
      </div>`;
    }).join('');

    document.getElementById('relatoriosContent').innerHTML = `
      <div class="card" style="padding:20px;margin-bottom:20px;">
        <h3 style="font-weight:700;color:#0f172a;margin-bottom:16px;">Comissões — Últimos 6 Meses</h3>
        <div style="display:flex;align-items:flex-end;gap:8px;height:140px;padding-bottom:0;">${bars}</div>
      </div>
      <div class="card" style="overflow:hidden;">
        <div style="padding:16px 20px;border-bottom:1px solid #f1f5f9;"><h3 style="font-weight:700;color:#0f172a;">Resumo Mensal</h3></div>
        <table>
          <thead><tr><th>Mês</th><th>Vendas</th><th>Comissão Total</th><th>Média por Venda</th></tr></thead>
          <tbody>${monthRows}</tbody>
        </table>
      </div>
    `;
  },

  saveConfig() {
    const g = id => parseFloat(document.getElementById(id).value) || 0;
    const s = Store.getSettings();
    s.vehicleCommission.belowMeta = g('cfg_belowMeta');
    s.vehicleCommission.meta = g('cfg_meta');
    s.vehicleCommission.metaThreshold = g('cfg_metaThreshold');
    [7,8,9,10].forEach(n => { s.vehicleCommission.bonusRates[n] = g('cfg_bonus'+n) / 100; });
    s.ipva.withoutGoal = g('cfg_ipvaNoMeta') / 100;
    s.ipva.withGoal = g('cfg_ipvaWithMeta') / 100;
    s.financing.rRates = {
      R1: g('cfg_rR1') / 100,
      R2: g('cfg_rR2') / 100,
      R3: g('cfg_rR3') / 100,
      R4: g('cfg_rR4') / 100
    };
    s.financing.taxDeduction = g('cfg_taxDed') / 100;
    s.financing.withoutGoalWithoutTAC = g('cfg_finNoMetaNoTAC') / 100;
    s.financing.withoutGoalWithTAC = g('cfg_finNoMetaTAC') / 100;
    s.financing.withGoalWithoutTAC = g('cfg_finMetaNoTAC') / 100;
    s.financing.withGoalWithTAC = g('cfg_finMetaTAC') / 100;
    s.financing.tacValue = g('cfg_tacValue');
    s.insurance.withoutGoal = g('cfg_insNoMeta');
    s.insurance.withGoal = g('cfg_insWithMeta');
    s.despachante.withoutGoal = g('cfg_despNoMeta');
    s.despachante.withSalesGoal = g('cfg_despSalesMeta');
    s.despachante.withBothGoals = g('cfg_despBothMeta');
    s.despachante.registrationGoalThreshold = g('cfg_despRegThreshold') / 100;
    s.despachante.valueFlorianopolis = g('cfg_despFln');
    s.despachante.valueOutside = g('cfg_despOut');
    s.excedente.withoutGoal = g('cfg_excNoMeta') / 100;
    s.excedente.withGoal = g('cfg_excWithMeta') / 100;
    s.consigned.captationRate = g('cfg_consCap') / 100;
    s.consigned.servicesRate = g('cfg_consServ') / 100;
    s.stockPurchase.min = g('cfg_stockCapMin');
    s.stockPurchase.max = g('cfg_stockCapMax');
    Store.saveSettings(s);
    toast('Configurações salvas com sucesso!');
  },

  resetConfig() {
    if (!confirm('Restaurar todas as configurações para o padrão?')) return;
    Store.saveSettings(JSON.parse(JSON.stringify(DEFAULT_SETTINGS)));
    this.renderConfig();
    toast('Configurações restauradas!');
  },

  // ============================================================
  // USUÁRIOS
  // ============================================================
  renderUsuarios() {
    if (this.currentUser.role !== 'admin') return;
    const users = Store.getUsers();
    let rows = users.map(u => `<tr>
      <td><strong>${u.name}</strong></td>
      <td>${u.email}</td>
      <td><span class="badge ${u.role==='admin'?'badge-purple':'badge-blue'}">${u.role==='admin'?'Administrador':'Vendedor'}</span></td>
      <td><span class="badge ${u.active?'badge-green':'badge-red'}">${u.active?'Ativo':'Inativo'}</span></td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="App.openUserModal('${u.id}')" style="margin-right:4px;">Editar</button>
        ${u.id !== this.currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="App.deleteUser('${u.id}')">Del</button>` : '<span style="font-size:.72rem;color:#94a3b8;">você</span>'}
      </td>
    </tr>`).join('');

    document.getElementById('usuariosContent').innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
        <button class="btn btn-primary" onclick="App.openUserModal()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Novo Usuário
        </button>
      </div>
      <div class="card" style="overflow:hidden;">
        <table>
          <thead><tr><th>Nome</th><th>E-mail</th><th>Perfil</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  },

  // ============================================================
  // MODAL: VENDA
  // ============================================================
  openSaleModal(saleId) {
    const isAdmin = this.currentUser.role === 'admin';
    const sale = saleId ? Store.getSaleById(saleId) : null;
    const v = sale || {};
    const sellers = Store.getUsers().filter(u => u.active);
    const ctx = getContext(this.currentUser.role === 'admin' ? null : this.currentUser.id);

    const sellerOptions = isAdmin ? `<div class="form-group">
      <label class="form-label">Vendedor</label>
      <select class="form-select" id="sf_seller">
        ${sellers.map(u => `<option value="${u.id}" ${(v.sellerId||this.currentUser.id)===u.id?'selected':''}>${u.name}</option>`).join('')}
      </select>
    </div>` : '';

    const fin = v.financing || {};
    const ipvaC = v.ipvaClient || {};
    const ipvaS = v.ipvaStock || {};
    const exc = v.excedente || {};
    const cons = v.consigned || {};
    const stockCap = v.stockCaptation || {};

    const previewComm = sale ? (() => {
      const res = Calculator.calculate(sale, ctx);
      return `<div class="alert alert-success" style="display:flex;align-items:center;justify-content:space-between;">
        <span>Comissão calculada:</span>
        <strong style="font-size:1.1rem;">${fmtR(res.total)}</strong>
      </div>`;
    })() : '';

    showModal(`<div class="modal modal-lg">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <h2 style="font-size:1.2rem;font-weight:800;color:#0f172a;">${sale ? 'Editar Venda' : 'Nova Venda'}</h2>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1.5rem;line-height:1;">&times;</button>
      </div>
      ${previewComm}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        ${sellerOptions}
        <div>
          <label class="form-label">Data da Venda</label>
          <input class="form-input" id="sf_date" type="date" value="${v.date ? v.date.substr(0,10) : new Date().toISOString().substr(0,10)}">
        </div>
        <div>
          <label class="form-label">Veículo (modelo)</label>
          <input class="form-input" id="sf_vehicle" type="text" placeholder="Ex: Toyota Corolla 2022" value="${v.vehicle||''}">
        </div>
        <div>
          <label class="form-label">Placa</label>
          <input class="form-input" id="sf_plate" type="text" placeholder="ABC-1234" value="${v.plate||''}">
        </div>
        <div>
          <label class="form-label">Tipo de Venda</label>
          <select class="form-select" id="sf_type">
            <option value="estoque" ${(v.type||'estoque')==='estoque'?'selected':''}>Estoque</option>
            <option value="consignado" ${v.type==='consignado'?'selected':''}>Consignado</option>
            <option value="repasse" ${v.type==='repasse'?'selected':''}>Repasse</option>
          </select>
        </div>
      </div>

      <div class="section-divider"></div>
      <h4 style="font-weight:700;color:#374151;margin-bottom:4px;font-size:.875rem;">Financiamento</h4>
      <div class="alert alert-info" style="margin-bottom:12px;font-size:.75rem;padding:8px 12px;">
        <strong>Cálculo:</strong> Valor × alíquota R → desconta 25% impostos → × taxa (meta + TAC)
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:end;">
        <div>
          <label class="form-label">Valor total financiado (R$)</label>
          <input class="form-input" id="sf_finValue" type="number" step="0.01" placeholder="0,00" value="${fin.value||''}">
        </div>
        <div>
          <label class="form-label">Alíquota R</label>
          <select class="form-select" id="sf_rTier">
            <option value="">Sem financiamento</option>
            <option value="R1" ${fin.rTier==='R1'?'selected':''}>R1 — 1,2%</option>
            <option value="R2" ${fin.rTier==='R2'?'selected':''}>R2 — 2,4%</option>
            <option value="R3" ${fin.rTier==='R3'?'selected':''}>R3 — 3,6%</option>
            <option value="R4" ${fin.rTier==='R4'?'selected':''}>R4 — 4,8%</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-bottom:2px;">
          <input class="form-checkbox" id="sf_hasTAC" type="checkbox" ${fin.hasTAC?'checked':''}>
          <label for="sf_hasTAC" class="form-label" style="margin:0;cursor:pointer;">Inclui TAC (R$${fmt(ctx.settings.financing.tacValue)})</label>
        </div>
      </div>

      <div class="section-divider"></div>
      <h4 style="font-weight:700;color:#374151;margin-bottom:12px;font-size:.875rem;">IPVA</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;align-items:end;">
        <div>
          <label class="form-label">IPVA cliente (R$)</label>
          <input class="form-input" id="sf_ipvaCValue" type="number" step="0.01" placeholder="0,00" value="${ipvaC.value||''}">
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-bottom:2px;">
          <input class="form-checkbox" id="sf_ipvaCEligible" type="checkbox" ${ipvaC.eligible?'checked':''}>
          <label for="sf_ipvaCEligible" class="form-label" style="margin:0;cursor:pointer;">Bônus IPVA cliente</label>
        </div>
        <div>
          <label class="form-label">IPVA estoque (R$)</label>
          <input class="form-input" id="sf_ipvaSValue" type="number" step="0.01" placeholder="0,00" value="${ipvaS.value||''}">
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-bottom:2px;">
          <input class="form-checkbox" id="sf_ipvaSEligible" type="checkbox" ${ipvaS.eligible?'checked':''}>
          <label for="sf_ipvaSEligible" class="form-label" style="margin:0;cursor:pointer;">Bônus IPVA estoque</label>
        </div>
      </div>

      <div class="section-divider"></div>
      <h4 style="font-weight:700;color:#374151;margin-bottom:12px;font-size:.875rem;">Outros</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input class="form-checkbox" id="sf_hasInsurance" type="checkbox" ${v.hasInsurance?'checked':''}>
            <label for="sf_hasInsurance" class="form-label" style="margin:0;cursor:pointer;">Seguro Safra</label>
          </div>
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <input class="form-checkbox" id="sf_hasDespachante" type="checkbox" ${v.hasDespachante?'checked':''}>
            <label for="sf_hasDespachante" class="form-label" style="margin:0;cursor:pointer;">Despachante</label>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <input class="form-checkbox" id="sf_isPlated" type="checkbox" ${v.isPlated?'checked':''}>
            <label for="sf_isPlated" class="form-label" style="margin:0;cursor:pointer;">Emplacado</label>
          </div>
        </div>
      </div>

      <div class="section-divider"></div>
      <h4 style="font-weight:700;color:#374151;margin-bottom:12px;font-size:.875rem;">Excedente / Lucro</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <label class="form-label">Valor do excedente (R$)</label>
          <input class="form-input" id="sf_excValue" type="number" step="0.01" placeholder="0,00" value="${exc.value||''}">
        </div>
      </div>

      <div class="section-divider"></div>
      <h4 style="font-weight:700;color:#374151;margin-bottom:12px;font-size:.875rem;">Consignado / Captação</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">
        <div>
          <label class="form-label">Lucro captação consignado (R$)</label>
          <input class="form-input" id="sf_consCap" type="number" step="0.01" placeholder="0,00" value="${cons.captationProfit||''}">
        </div>
        <div>
          <label class="form-label">Lucro serviços consignado (R$)</label>
          <input class="form-input" id="sf_consServ" type="number" step="0.01" placeholder="0,00" value="${cons.servicesProfit||''}">
        </div>
        <div>
          <label class="form-label">Bônus captação estoque (R$)</label>
          <input class="form-input" id="sf_stockCap" type="number" step="0.01" placeholder="500–1000" value="${stockCap.value||''}">
        </div>
      </div>

      <div class="section-divider"></div>
      <div>
        <label class="form-label">Observações</label>
        <textarea class="form-input" id="sf_notes" rows="2" placeholder="Notas adicionais...">${v.notes||''}</textarea>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="App.saveSale('${saleId||''}')">
          ${sale ? 'Salvar Alterações' : 'Registrar Venda'}
        </button>
      </div>
    </div>`);
  },

  saveSale(saleId) {
    const isAdmin = this.currentUser.role === 'admin';
    const sellerId = isAdmin ? document.getElementById('sf_seller').value : this.currentUser.id;
    const g = id => parseFloat(document.getElementById(id).value) || 0;
    const c = id => document.getElementById(id).checked;
    const t = id => document.getElementById(id).value;

    const sale = {
      id: saleId || uid(),
      sellerId,
      date: t('sf_date') || new Date().toISOString().substr(0,10),
      vehicle: t('sf_vehicle'),
      plate: t('sf_plate'),
      type: t('sf_type'),
      financing: { value: g('sf_finValue'), rTier: document.getElementById('sf_rTier').value, hasTAC: c('sf_hasTAC') },
      ipvaClient: { value: g('sf_ipvaCValue'), eligible: c('sf_ipvaCEligible') },
      ipvaStock: { value: g('sf_ipvaSValue'), eligible: c('sf_ipvaSEligible') },
      hasInsurance: c('sf_hasInsurance'),
      hasDespachante: c('sf_hasDespachante'),
      isPlated: c('sf_isPlated'),
      excedente: { value: g('sf_excValue') },
      consigned: { captationProfit: g('sf_consCap'), servicesProfit: g('sf_consServ') },
      stockCaptation: { value: g('sf_stockCap') },
      notes: t('sf_notes')
    };

    Store.saveSale(sale);
    closeModal();
    toast(saleId ? 'Venda atualizada!' : 'Venda registrada!');
    this.navigate(this.currentPage);
  },

  deleteSale(id) {
    if (!confirm('Excluir esta venda?')) return;
    Store.deleteSale(id);
    toast('Venda excluída.', 'info');
    this.navigate(this.currentPage);
  },

  // ============================================================
  // MODAL: ESTOQUE
  // ============================================================
  openStockModal(stockId) {
    const item = stockId ? Store.getStockById(stockId) : null;
    const v = item || {};
    showModal(`<div class="modal modal-sm">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h2 style="font-size:1.1rem;font-weight:800;color:#0f172a;">${item ? 'Editar Veículo' : 'Adicionar ao Estoque'}</h2>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1.5rem;line-height:1;">&times;</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <label class="form-label">Placa</label>
          <input class="form-input" id="stk_plate" type="text" placeholder="ABC-1234" value="${v.plate||''}">
        </div>
        <div>
          <label class="form-label">Modelo</label>
          <input class="form-input" id="stk_model" type="text" placeholder="Toyota Corolla" value="${v.model||''}">
        </div>
        <div>
          <label class="form-label">Ano</label>
          <input class="form-input" id="stk_year" type="number" placeholder="2022" value="${v.year||''}">
        </div>
        <div>
          <label class="form-label">Cor</label>
          <input class="form-input" id="stk_color" type="text" placeholder="Prata" value="${v.color||''}">
        </div>
        <div>
          <label class="form-label">Data de Entrada</label>
          <input class="form-input" id="stk_entryDate" type="date" value="${v.entryDate ? v.entryDate.substr(0,10) : new Date().toISOString().substr(0,10)}">
        </div>
        <div>
          <label class="form-label">Status</label>
          <select class="form-select" id="stk_status">
            <option value="available" ${(v.status||'available')==='available'?'selected':''}>Disponível</option>
            <option value="reserved" ${v.status==='reserved'?'selected':''}>Reservado</option>
            <option value="sold" ${v.status==='sold'?'selected':''}>Vendido</option>
          </select>
        </div>
      </div>
      <div style="margin-top:14px;">
        <label class="form-label">Observações</label>
        <input class="form-input" id="stk_notes" type="text" placeholder="Notas..." value="${v.notes||''}">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="App.saveStock('${stockId||''}')">Salvar</button>
      </div>
    </div>`);
  },

  saveStock(stockId) {
    const t = id => document.getElementById(id).value;
    const item = {
      id: stockId || uid(),
      plate: t('stk_plate'),
      model: t('stk_model'),
      year: parseInt(t('stk_year')) || null,
      color: t('stk_color'),
      entryDate: t('stk_entryDate'),
      status: t('stk_status'),
      notes: t('stk_notes')
    };
    Store.saveStock(item);
    closeModal();
    toast(stockId ? 'Veículo atualizado!' : 'Veículo adicionado ao estoque!');
    this.navigate(this.currentPage);
  },

  deleteStock(id) {
    if (!confirm('Remover este veículo do estoque?')) return;
    Store.deleteStock(id);
    toast('Veículo removido.', 'info');
    this.navigate(this.currentPage);
  },

  // ============================================================
  // MODAL: USUÁRIO
  // ============================================================
  openUserModal(userId) {
    const user = userId ? Store.getUserById(userId) : null;
    const v = user || {};
    showModal(`<div class="modal modal-sm">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h2 style="font-size:1.1rem;font-weight:800;color:#0f172a;">${user ? 'Editar Usuário' : 'Novo Usuário'}</h2>
        <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1.5rem;line-height:1;">&times;</button>
      </div>
      <div style="display:grid;gap:14px;">
        <div>
          <label class="form-label">Nome completo</label>
          <input class="form-input" id="uf_name" type="text" placeholder="Nome do vendedor" value="${v.name||''}">
        </div>
        <div>
          <label class="form-label">E-mail</label>
          <input class="form-input" id="uf_email" type="email" placeholder="email@exemplo.com" value="${v.email||''}">
        </div>
        <div>
          <label class="form-label">${user ? 'Nova senha (deixe vazio para manter)' : 'Senha'}</label>
          <input class="form-input" id="uf_password" type="password" placeholder="••••••••">
        </div>
        <div>
          <label class="form-label">Perfil</label>
          <select class="form-select" id="uf_role">
            <option value="seller" ${(v.role||'seller')==='seller'?'selected':''}>Vendedor</option>
            <option value="admin" ${v.role==='admin'?'selected':''}>Administrador</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input class="form-checkbox" id="uf_active" type="checkbox" ${(v.active !== false)?'checked':''}>
          <label for="uf_active" class="form-label" style="margin:0;cursor:pointer;">Usuário ativo</label>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="App.saveUser('${userId||''}')">Salvar</button>
      </div>
    </div>`);
  },

  saveUser(userId) {
    const t = id => document.getElementById(id).value;
    const c = id => document.getElementById(id).checked;
    const existing = userId ? Store.getUserById(userId) : null;
    const password = t('uf_password');
    if (!userId && !password) { toast('Informe uma senha para o novo usuário.', 'error'); return; }
    const email = t('uf_email');
    const duplicate = Store.getUsers().find(u => u.email === email && u.id !== userId);
    if (duplicate) { toast('Já existe um usuário com este e-mail.', 'error'); return; }
    const user = {
      id: userId || uid(),
      name: t('uf_name'),
      email,
      password: password || (existing ? existing.password : ''),
      role: t('uf_role'),
      active: c('uf_active'),
      createdAt: existing ? existing.createdAt : new Date().toISOString()
    };
    Store.saveUser(user);
    closeModal();
    toast(userId ? 'Usuário atualizado!' : 'Usuário criado!');
    this.renderUsuarios();
  },

  deleteUser(id) {
    if (id === this.currentUser.id) { toast('Não é possível excluir seu próprio usuário.', 'error'); return; }
    if (!confirm('Excluir este usuário permanentemente?')) return;
    Store.deleteUser(id);
    toast('Usuário excluído.', 'info');
    this.renderUsuarios();
  }
};

// Init
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
